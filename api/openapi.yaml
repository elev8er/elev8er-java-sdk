components:
  headers:
    RateLimitLimit:
      description: Request quota for the current window.
      explode: false
      schema:
        type: integer
      style: simple
    RateLimitRemaining:
      description: Requests remaining in the current window.
      explode: false
      schema:
        type: integer
      style: simple
    RateLimitReset:
      description: Unix epoch seconds when the window resets.
      explode: false
      schema:
        type: integer
      style: simple
  parameters:
    Page:
      description: 1-based page number.
      explode: true
      in: query
      name: page
      required: false
      schema:
        default: 1
        minimum: 1
        type: integer
      style: form
    Limit:
      description: Items per page (max 100).
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 20
        maximum: 100
        minimum: 1
        type: integer
      style: form
    Search:
      description: Free-text search filter.
      explode: true
      in: query
      name: search
      required: false
      schema:
        type: string
      style: form
    IdPath:
      explode: false
      in: path
      name: id
      required: true
      schema:
        type: string
      style: simple
    VersionIdPath:
      explode: false
      in: path
      name: versionId
      required: true
      schema:
        type: string
      style: simple
    TagIdPath:
      explode: false
      in: path
      name: tagId
      required: true
      schema:
        type: string
      style: simple
    ExpertIdPath:
      explode: false
      in: path
      name: expertId
      required: true
      schema:
        type: string
      style: simple
    ChatIdPath:
      explode: false
      in: path
      name: chatId
      required: true
      schema:
        type: string
      style: simple
  responses:
    Ok:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
      description: Successful response.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/RateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/RateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/RateLimitReset'
    ProgramSingle:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
      description: A single program.
    ProgramList:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/listPrograms_200_response'
      description: A page of programs.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/RateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/RateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/RateLimitReset'
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Missing or invalid API key.
    Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: API key is valid but not authorised for this resource (scope).
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Resource not found.
    ValidationError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Request payload failed validation.
    RateLimited:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Rate limit exceeded.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/RateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/RateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/RateLimitReset'
  schemas:
    SuccessEnvelope:
      example:
        data: ""
        success: true
        message: message
      properties:
        success:
          example: true
          type: boolean
        message:
          type: string
        data: {}
      required:
      - success
      type: object
    Pagination:
      example:
        total: 1
        limit: 6
        totalPages: 5
        page: 0
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      type: object
    Error:
      example:
        success: false
        message: message
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        success:
          example: false
          type: boolean
        message:
          type: string
        timestamp:
          format: date-time
          type: string
      required:
      - message
      - success
      type: object
    ProgramInput:
      additionalProperties: true
      description: Program payload. Fields to be finalised against program-service
        in Phase 4.
      type: object
    TestInput:
      additionalProperties: true
      type: object
    VisualTestInput:
      additionalProperties: true
      type: object
    BlogInput:
      additionalProperties: true
      type: object
    ExpertInput:
      additionalProperties: true
      type: object
    ChatMessageInput:
      additionalProperties: true
      example:
        message: message
      properties:
        message:
          description: The user message to send to the agent.
          type: string
      required:
      - message
      type: object
    listPrograms_200_response:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - properties:
          pagination:
            $ref: '#/components/schemas/Pagination'
        type: object
      example:
        pagination:
          total: 1
          limit: 6
          totalPages: 5
          page: 0
        data: ""
        success: true
        message: message
    createProgramTag_request:
      properties:
        name:
          type: string
      required:
      - name
      type: object
    updateProgramTag_request:
      properties:
        name:
          type: string
      type: object
    setProgramTags_request:
      properties:
        tagIds:
          items:
            type: string
          type: array
      type: object
    updateSessionStatus_request:
      properties:
        status:
          type: string
      required:
      - status
      type: object
    createAgentChat_request:
      properties:
        title:
          type: string
      type: object
  securitySchemes:
    ApiKeyAuth:
      description: Team-scoped API key (format `pk_live_...`). Manage keys in the
        elev8er panel (Team › API Keys).
      in: header
      name: X-API-Key
      type: apiKey

