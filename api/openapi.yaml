openapi: 3.0.3
info:
  contact:
    email: support@elev8er.ai
    name: elev8er API Support
  description: |
    Team-scoped public API for elev8er. Authenticate every request with an API key issued per team (`X-API-Key` header). Keys are created and managed from the elev8er panel (Team › API Keys). This API is intended for **server-to-server** use — never expose your API key in a browser or mobile client.

    **Rate limiting:** every response includes `X-RateLimit-Limit`, `X-RateLimit-Remaining` and `X-RateLimit-Reset` headers. When the limit is exceeded the API returns `429 Too Many Requests`.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: elev8er Public API
  version: 1.0.0
servers:
- description: Development
  url: https://apidev.elev8er.ai/public/api/v1
- description: Production
  url: https://api.elev8er.ai/public/api/v1
security:
- ApiKeyAuth: []
tags:
- description: Program management (full CRUD).
  name: Programs
- description: Test management (full CRUD).
  name: Tests
- description: Visual test management (full CRUD).
  name: Visual Tests
- description: Blog management (full CRUD).
  name: Blogs
- description: "Experts, their availability and sessions (full CRUD)."
  name: Experts
- description: Read agents and chat with them (chat only — no create/train).
  name: Agents
paths:
  /programs:
    get:
      operationId: listPrograms
      parameters:
      - description: 1-based page number.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Items per page (max 100).
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Free-text search filter.
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listPrograms_200_response'
          description: A page of programs.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid API key.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: API key is valid but not authorised for this resource (scope).
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
      summary: List programs
      tags:
      - Programs
      x-accepts:
      - application/json
    post:
      operationId: createProgram
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
          description: A single program.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Request payload failed validation.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid API key.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: API key is valid but not authorised for this resource (scope).
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
      summary: Create a program
      tags:
      - Programs
      x-content-type: application/json
      x-accepts:
      - application/json
